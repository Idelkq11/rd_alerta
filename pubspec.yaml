name: rd_alerta
description: App de reportes ciudadanos de República Dominicana.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  google_sign_in: ^6.2.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1
  iconsax: ^0.0.8
  intl: ^0.19.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/